version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-farm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-farm}
      POSTGRES_DB: ${POSTGRES_DB:-farm_platform}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Exposed on LAN for local psql/debugging; remove/bind to 127.0.0.1 before this ever faces the internet
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-farm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-farm}:${POSTGRES_PASSWORD:-farm}@db:5432/${POSTGRES_DB:-farm_platform}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-720}
    depends_on:
      db:
        condition: service_healthy
    # No host port published here on purpose — Caddy is the only thing
    # exposed on the LAN; the API is only reachable via the /api/ proxy path.
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    # Produces static Blazor WASM output; served by Caddy below, not by this
    # container directly (kept as a separate stage for clean rebuilds).
    volumes:
      - web_dist:/dist

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      # - "443:443"   # enable once this has a real domain (Phase 5 / cloud)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web_dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  web_dist:
  caddy_data:
  caddy_config:
